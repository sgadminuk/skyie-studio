# =============================================================================
# Skyie Studio — Production Docker Compose
# Domain: skyie.studio (frontend) + api.skyie.studio (backend API)
# =============================================================================

services:
  # ─── PostgreSQL 16 ─────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: skyie-studio-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-skyie_studio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-skyie_studio}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - skyie-studio-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-skyie_studio} -d ${POSTGRES_DB:-skyie_studio}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 256M

  # ─── Redis 7 (Celery broker + pub/sub + sessions) ─────────────────────────
  redis:
    image: redis:7-alpine
    container_name: skyie-studio-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - skyie-studio-internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M

  # ─── Backend API (FastAPI) ─────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: skyie-studio-backend
    restart: always
    environment:
      ENVIRONMENT: production
      MOCK_MODE: ${MOCK_MODE:-false}
      DATABASE_URL: "postgresql+asyncpg://${POSTGRES_USER:-skyie_studio}:${POSTGRES_PASSWORD}@skyie-studio-postgres:5432/${POSTGRES_DB:-skyie_studio}"
      DATABASE_URL_SYNC: "postgresql://${POSTGRES_USER:-skyie_studio}:${POSTGRES_PASSWORD}@skyie-studio-postgres:5432/${POSTGRES_DB:-skyie_studio}"
      REDIS_URL: "redis://skyie-studio-redis:6379/0"
      CELERY_BROKER_URL: "redis://skyie-studio-redis:6379/0"
      CELERY_RESULT_BACKEND: "redis://skyie-studio-redis:6379/1"
      ASSETS_PATH: /app/assets
      TEMP_PATH: /app/temp
      OUTPUT_PATH: /app/assets/generated
      GPU_REGISTRATION_KEY: ${GPU_REGISTRATION_KEY:-}
      GPU_API_KEY: ${GPU_API_KEY:-}
      GPU_HEARTBEAT_TIMEOUT: "120"
      MAIELR_API_KEY: ${MAIELR_API_KEY:-}
      MAIELR_WEBHOOK_SECRET: ${MAIELR_WEBHOOK_SECRET:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      RUNPOD_API_KEY: ${RUNPOD_API_KEY:-}
      RUNPOD_FORGE_IMAGE_ENDPOINT_ID: ${RUNPOD_FORGE_IMAGE_ENDPOINT_ID:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - assets_data:/app/assets
      - temp_data:/app/temp
    networks:
      - skyie-studio-internal
      - SkyieProxy
    healthcheck:
      test: ["CMD", "curl", "-sf", "--max-time", "5", "http://localhost:8000/api/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "1.0"
          memory: 512M
    labels:
      # Skyie shared proxy (`/opt/skyie-proxy/` on the VPS) supplies
      # global HTTP→HTTPS redirect, security headers, compression, and
      # Cloudflare Origin CA TLS for *.skyie.studio. Apps only declare
      # their host + port + health check.
      - "traefik.enable=true"
      - "traefik.docker.network=SkyieProxy"
      - "traefik.http.routers.skyie-studio-api.rule=Host(`api.skyie.studio`)"
      - "traefik.http.routers.skyie-studio-api.entrypoints=websecure"
      - "traefik.http.routers.skyie-studio-api.tls=true"
      - "traefik.http.services.skyie-studio-api.loadbalancer.server.port=8000"
      # App-specific health check — Traefik stops routing to unhealthy backends
      - "traefik.http.services.skyie-studio-api.loadbalancer.healthcheck.path=/api/v1/health"
      - "traefik.http.services.skyie-studio-api.loadbalancer.healthcheck.interval=10s"
      - "traefik.http.services.skyie-studio-api.loadbalancer.healthcheck.timeout=5s"

  # ─── Celery Worker ─────────────────────────────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: skyie-studio-worker
    restart: always
    command: celery -A services.job_queue:celery_app worker --loglevel=info --concurrency=1
    environment:
      PYTHONPATH: /app
      ENVIRONMENT: production
      MOCK_MODE: ${MOCK_MODE:-false}
      DATABASE_URL: "postgresql+asyncpg://${POSTGRES_USER:-skyie_studio}:${POSTGRES_PASSWORD}@skyie-studio-postgres:5432/${POSTGRES_DB:-skyie_studio}"
      DATABASE_URL_SYNC: "postgresql://${POSTGRES_USER:-skyie_studio}:${POSTGRES_PASSWORD}@skyie-studio-postgres:5432/${POSTGRES_DB:-skyie_studio}"
      REDIS_URL: "redis://skyie-studio-redis:6379/0"
      CELERY_BROKER_URL: "redis://skyie-studio-redis:6379/0"
      CELERY_RESULT_BACKEND: "redis://skyie-studio-redis:6379/1"
      ASSETS_PATH: /app/assets
      TEMP_PATH: /app/temp
      OUTPUT_PATH: /app/assets/generated
      GPU_API_KEY: ${GPU_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      RUNPOD_API_KEY: ${RUNPOD_API_KEY:-}
      RUNPOD_FORGE_IMAGE_ENDPOINT_ID: ${RUNPOD_FORGE_IMAGE_ENDPOINT_ID:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    volumes:
      - assets_data:/app/assets
      - temp_data:/app/temp
    networks:
      - skyie-studio-internal
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4G
        reservations:
          cpus: "0.5"
          memory: 512M

  # ─── Frontend (Next.js) ────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: "https://api.skyie.studio"
    container_name: skyie-studio-frontend
    restart: always
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - SkyieProxy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000').then(r=>{if(r.ok)process.exit(0);process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 256M
    labels:
      # Unified app — serves marketing apex + dashboard subdomain from the
      # same Next process. src/middleware.ts inspects the Host header and
      # rewrites app.skyie.studio/foo → /dashboard/foo internally.
      - "traefik.enable=true"
      - "traefik.docker.network=SkyieProxy"
      - "traefik.http.routers.skyie-studio.rule=Host(`skyie.studio`) || Host(`www.skyie.studio`) || Host(`app.skyie.studio`) || Host(`forge.skyie.studio`)"
      - "traefik.http.routers.skyie-studio.entrypoints=websecure"
      - "traefik.http.routers.skyie-studio.tls=true"
      - "traefik.http.services.skyie-studio.loadbalancer.server.port=3000"
      # www → apex redirect (permanent)
      - "traefik.http.middlewares.skyie-studio-www-redirect.redirectregex.regex=^https?://www\\.skyie\\.studio/(.*)"
      - "traefik.http.middlewares.skyie-studio-www-redirect.redirectregex.replacement=https://skyie.studio/$${1}"
      - "traefik.http.middlewares.skyie-studio-www-redirect.redirectregex.permanent=true"
      - "traefik.http.routers.skyie-studio.middlewares=skyie-studio-www-redirect"

networks:
  skyie-studio-internal:
    driver: bridge
  SkyieProxy:
    external: true

volumes:
  postgres_data:
  redis_data:
  assets_data:
  temp_data:
