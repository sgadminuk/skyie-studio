name: Build Forge GPU image

# Builds the Skyie Forge serverless GPU image and pushes to ghcr.io.
# Triggered when anything under gpu-server/ changes on main, or manually
# via the workflow_dispatch button on the Actions tab.
#
# HF_TOKEN is consumed as a Docker build arg so the FLUX-dev weights
# bake into the image at build time. The token comes from
# repository secrets, never appears in logs, and is dropped from the
# final image (the Dockerfile clears the ENV after the download steps).

on:
  push:
    branches: [main]
    paths:
      - "gpu-server/Dockerfile.serverless"
      - "gpu-server/handler.py"
      - "gpu-server/requirements.serverless.txt"
      - ".github/workflows/build-forge-image.yml"
  workflow_dispatch: {}

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/skyie-studio-forge

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    timeout-minutes: 90  # 25 GB of FLUX weights baked at build time

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Reclaim disk space
        # Default GH runner only has ~14 GB free; FLUX-dev download alone
        # exceeds that. Aggressively prune unused tooling so the docker
        # build has room to bake weights.
        run: |
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android \
                      /opt/ghc /opt/hostedtoolcache /usr/local/share/boost \
                      "$AGENT_TOOLSDIRECTORY"
          sudo apt-get clean
          docker system prune -af || true
          df -h /

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./gpu-server
          file: ./gpu-server/Dockerfile.serverless
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # BuildKit `--secret` mounts the value as a file at /run/secrets/<id>
          # only inside RUN steps that opt in via --mount=type=secret. Never
          # written to image layers; doesn't appear in `docker history`.
          secrets: |
            "hftoken=${{ secrets.HF_TOKEN }}"
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Image summary
        run: |
          echo "## Forge image built" >> $GITHUB_STEP_SUMMARY
          echo "Tags: ${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Pull with:" >> $GITHUB_STEP_SUMMARY
          echo '\`\`\`' >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest" >> $GITHUB_STEP_SUMMARY
          echo '\`\`\`' >> $GITHUB_STEP_SUMMARY
