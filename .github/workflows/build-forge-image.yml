name: Build Forge GPU image

# Builds the Skyie Forge serverless GPU image and pushes to ghcr.io.
# Triggered when anything under gpu-server/ changes on main, or manually
# via the workflow_dispatch button on the Actions tab.
#
# HF_TOKEN is consumed as a Docker build arg so the FLUX-dev weights
# bake into the image at build time. The token comes from
# repository secrets, never appears in logs, and is dropped from the
# final image (the Dockerfile clears the ENV after the download steps).

on:
  push:
    branches: [main]
    paths:
      - "gpu-server/Dockerfile.serverless"
      - "gpu-server/handler.py"
      - "gpu-server/requirements.serverless.txt"
      - ".github/workflows/build-forge-image.yml"
  workflow_dispatch: {}

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/skyie-studio-forge

jobs:
  build-and-push:
    # Self-hosted runner on the Contabo VPS — has 317 GB free disk and fast
    # network. Tagged with the unique `forge-builder` label so only this
    # workflow uses it; CI / Deploy to VPS keep using GitHub-hosted runners.
    runs-on: [self-hosted, forge-builder]
    permissions:
      contents: read
      packages: write
    timeout-minutes: 90  # 25 GB of FLUX weights baked at build time

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify disk space
        # Self-hosted runner on Contabo VPS — should have 200+ GB free.
        # If <80 GB free, fail fast rather than blow up mid-FLUX-download.
        run: |
          df -h /
          FREE_GB=$(df -BG / | tail -1 | awk '{print $4}' | sed 's/G//')
          if [ "$FREE_GB" -lt 80 ]; then
            echo "Insufficient free disk: ${FREE_GB} GB. Need ~80 GB for FLUX bake."
            exit 1
          fi
          echo "Free disk: ${FREE_GB} GB — OK"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          # docker driver runs BuildKit inside the host docker daemon (whose
          # data-root is now /mnt/docker = 75 GB), instead of the default
          # docker-container driver which runs buildkitd in a sub-container
          # with its own ~5 GB overlay limit. The docker driver loses
          # multi-platform builds (we only need linux/amd64) but can push
          # to a registry and supports BuildKit features we use.
          driver: docker

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./gpu-server
          file: ./gpu-server/Dockerfile.serverless
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # BuildKit `--secret` mounts the value as a file at /run/secrets/<id>
          # only inside RUN steps that opt in via --mount=type=secret. Never
          # written to image layers; doesn't appear in `docker history`.
          secrets: |
            "hftoken=${{ secrets.HF_TOKEN }}"
          # gha cache backend needs the docker-container driver — we're on
          # the docker driver to get the 75 GB /mnt overlay. Skip cache for
          # now; first build will pay full cost (~30-50 min), incremental
          # builds will pay full cost too. Worth it for it actually working.
          provenance: false

      - name: Image summary
        run: |
          echo "## Forge image built" >> $GITHUB_STEP_SUMMARY
          echo "Tags: ${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Pull with:" >> $GITHUB_STEP_SUMMARY
          echo '\`\`\`' >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest" >> $GITHUB_STEP_SUMMARY
          echo '\`\`\`' >> $GITHUB_STEP_SUMMARY
