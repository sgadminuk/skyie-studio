<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 284" role="img" aria-label="Skyie Studio animated mark">
  <title>Skyie Studio — Drift loop</title>
  <style>
    @keyframes skyie-drift {
      0%   { transform: translateY(0); }
      12.5%{ transform: translateY(-15.5px); }
      25%  { transform: translateY(-22px); }
      37.5%{ transform: translateY(-15.5px); }
      50%  { transform: translateY(0); }
      62.5%{ transform: translateY(15.5px); }
      75%  { transform: translateY(22px); }
      87.5%{ transform: translateY(15.5px); }
      100% { transform: translateY(0); }
    }
    .col { animation: skyie-drift 4s cubic-bezier(0.45, 0, 0.55, 1) infinite; }
    .c0 { animation-delay: 0s; }
    .c1 { animation-delay: -0.5s; }
    .c2 { animation-delay: -1s; }
    .c3 { animation-delay: -1.5s; }
    .c4 { animation-delay: -2s; }
    .c5 { animation-delay: -2.5s; }
    .c6 { animation-delay: -3s; }
    .c7 { animation-delay: -3.5s; }
    .c8 { animation-delay: -4s; }
  </style>
  <g fill="currentColor">
    <g class="col c0"><circle cx="20" cy="42" r="6"/><circle cx="20" cy="82" r="6"/><circle cx="20" cy="122" r="6"/><circle cx="20" cy="162" r="6"/><circle cx="20" cy="202" r="6"/><circle cx="20" cy="242" r="6"/></g>
    <g class="col c1"><circle cx="60" cy="42" r="6"/><circle cx="60" cy="82" r="6"/><circle cx="60" cy="122" r="6"/><circle cx="60" cy="162" r="6"/><circle cx="60" cy="202" r="6"/><circle cx="60" cy="242" r="6"/></g>
    <g class="col c2"><circle cx="100" cy="42" r="6"/><circle cx="100" cy="82" r="6"/><circle cx="100" cy="122" r="6"/><circle cx="100" cy="162" r="6"/><circle cx="100" cy="202" r="6"/><circle cx="100" cy="242" r="6"/></g>
    <g class="col c3"><circle cx="140" cy="42" r="6"/><circle cx="140" cy="82" r="6"/><circle cx="140" cy="122" r="6"/><circle cx="140" cy="162" r="6"/><circle cx="140" cy="202" r="6"/><circle cx="140" cy="242" r="6"/></g>
    <g class="col c4"><circle cx="180" cy="42" r="6"/><circle cx="180" cy="82" r="6"/><circle cx="180" cy="122" r="6"/><circle cx="180" cy="162" r="6"/><circle cx="180" cy="202" r="6"/><circle cx="180" cy="242" r="6"/></g>
    <g class="col c5"><circle cx="220" cy="42" r="6"/><circle cx="220" cy="82" r="6"/><circle cx="220" cy="122" r="6"/><circle cx="220" cy="162" r="6"/><circle cx="220" cy="202" r="6"/><circle cx="220" cy="242" r="6"/></g>
    <g class="col c6"><circle cx="260" cy="42" r="6"/><circle cx="260" cy="82" r="6"/><circle cx="260" cy="122" r="6"/><circle cx="260" cy="162" r="6"/><circle cx="260" cy="202" r="6"/><circle cx="260" cy="242" r="6"/></g>
    <g class="col c7"><circle cx="300" cy="42" r="6"/><circle cx="300" cy="82" r="6"/><circle cx="300" cy="122" r="6"/><circle cx="300" cy="162" r="6"/><circle cx="300" cy="202" r="6"/><circle cx="300" cy="242" r="6"/></g>
    <g class="col c8"><circle cx="340" cy="42" r="6"/><circle cx="340" cy="82" r="6"/><circle cx="340" cy="122" r="6"/><circle cx="340" cy="162" r="6"/><circle cx="340" cy="202" r="6"/><circle cx="340" cy="242" r="6"/></g>
  </g>
</svg>
