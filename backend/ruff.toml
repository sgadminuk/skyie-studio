line-length = 120

[lint]
select = ["E", "F", "W"]
ignore = [
    "E402",  # Module level import not at top of file (required for FastAPI router pattern)
]

[lint.per-file-ignores]
"alembic/*" = ["F401"]
# Static avatar-pack prompt presets — long-form copy where wrapping hurts readability.
"services/prompt_enhance_service.py" = ["E501"]
